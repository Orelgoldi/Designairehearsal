<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Design AI 7 — פידבק אישי למרצה</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:#041042; --navy2:#0a1a5c; --purple:#981fb6; --cyan:#2cffdf;
    --white:#fff; --muted:rgba(255,255,255,0.55); --card:rgba(255,255,255,0.05);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Assistant', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── background ── */
  .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-shape-1 { position: absolute; width: 340px; height: 680px; background: rgba(152,31,182,0.12); border-radius: 340px 0 0 340px; top: -80px; right: -60px; }
  .bg-shape-2 { position: absolute; width: 260px; height: 260px; background: rgba(44,255,223,0.05); border-radius: 50%; bottom: 60px; left: -80px; }

  /* ── login ── */
  #loginView {
    position: relative; z-index: 10;
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%; max-width: 440px;
    text-align: center;
    backdrop-filter: blur(20px);
  }
  .login-card .logo { margin-bottom: 32px; }
  .login-card .logo svg { width: 120px; height: auto; }
  .login-card h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .login-card p { color: var(--muted); font-size: 0.95rem; margin-bottom: 32px; }

  .form-group { margin-bottom: 16px; text-align: right; }
  .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
  .form-group select, .form-group input {
    width: 100%; padding: 12px 14px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    color: var(--white);
    font-family: 'Assistant', sans-serif;
    font-size: 1rem;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }
  .form-group select option { background: #0a1a5c; color: #fff; }
  .form-group select:focus, .form-group input:focus { border-color: rgba(44,255,223,0.4); }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--purple), #7b1598);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: 'Assistant', sans-serif;
    font-size: 1.05rem; font-weight: 700;
    cursor: pointer; margin-top: 8px;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.88; }
  .login-error { color: #ff6478; font-size: 0.88rem; margin-top: 12px; display: none; }

  /* ── main panel ── */
  #mainView { display: none; position: relative; z-index: 10; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(4,16,66,0.8);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 20;
  }
  .top-bar .logo svg { width: 90px; height: auto; }
  .top-bar-title { font-size: 0.95rem; color: var(--muted); }
  .logout-btn {
    background: none; border: 1px solid rgba(255,255,255,0.15);
    color: var(--muted); border-radius: 8px;
    padding: 6px 14px; font-family: 'Assistant', sans-serif;
    font-size: 0.85rem; cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .logout-btn:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

  .panel-body { padding: 32px 24px; max-width: 780px; margin: 0 auto; }

  .speaker-header {
    display: flex; align-items: center; gap: 20px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 18px;
    padding: 24px;
    margin-bottom: 28px;
  }
  .speaker-header img {
    width: 80px; height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(44,255,223,0.3);
  }
  .speaker-header .sp-info h2 { font-size: 1.3rem; font-weight: 800; }
  .speaker-header .sp-info .role { color: var(--cyan); font-size: 0.88rem; margin: 2px 0 6px; }
  .speaker-header .sp-info .talk { color: var(--muted); font-size: 0.85rem; line-height: 1.4; }

  .stats-row {
    display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .stat-box {
    flex: 1; min-width: 120px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
  }
  .stat-box .num { font-size: 2rem; font-weight: 800; color: var(--cyan); }
  .stat-box .lbl { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  .section-title {
    font-size: 1rem; font-weight: 700;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::before { content: ''; display: inline-block; width: 4px; height: 16px; background: var(--cyan); border-radius: 2px; }

  .feedback-list { display: flex; flex-direction: column; gap: 14px; margin-bottom: 40px; }

  .fb-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 20px;
  }
  .fb-card .fb-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  .fb-stars { color: var(--cyan); font-size: 1.1rem; letter-spacing: 2px; }
  .fb-time { font-size: 0.78rem; color: var(--muted); }

  .fb-row { margin-bottom: 12px; }
  .fb-row .fb-label { font-size: 0.78rem; font-weight: 700; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .fb-row .fb-text { font-size: 0.95rem; line-height: 1.5; color: rgba(255,255,255,0.88); }

  .empty-state {
    text-align: center; padding: 60px 24px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 16px; }

  @media (max-width: 480px) {
    .login-card { padding: 36px 24px; }
    .speaker-header { flex-direction: column; text-align: center; }
    .panel-body { padding: 20px 16px; }
  }
</style>
</head>
<body>

<div class="bg-shapes" aria-hidden="true">
  <div class="bg-shape-1"></div>
  <div class="bg-shape-2"></div>
</div>

    <h1>הפידבק שלי</h1>

    <span class="top-bar-title" id="topBarTitle"></span>
    <button class="logout-btn" onclick="doLogout()">יציאה</button>
  </div>

  <div class="panel-body">
    <div class="speaker-header" id="speakerHeader">
      <img id="spPhoto" src="" alt=""/>
      <div class="sp-info">
        <h2 id="spName"></h2>
        <div class="role" id="spRole"></div>
        <div class="talk" id="spTalk"></div>
      </div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="section-title">פידבקים שהתקבלו</div>
    <div class="feedback-list" id="feedbackList"></div>
  </div>
</div>

<script>
const SPEAKERS_DATA = {
  'דניאל בוארון':         { role: 'Design AI Founder',                       talk: 'דברי פתיחה — DESIGN TO CODE',                                             img: 'https://designai.co.il/wp-content/uploads/2025/12/danielb.png' },
  'עומרי הרמן':           { role: 'Founder at Spring',                        talk: 'The Product is The New Workspace',                                         img: 'https://designai.co.il/wp-content/uploads/2026/04/עמרי.png' },
  'גל דולב':              { role: 'Product Manager & AI Thought Leader',       talk: 'עקרונות קריטים לעיצוב חוויות מעולות ליוזר עם AI',                        img: 'https://designai.co.il/wp-content/uploads/2025/12/Frame-2147255694.png' },
  'חן האנה ויצמן':        { role: 'Staff Product Designer, Stealth Start-Up', talk: 'איך Cursor שינה את ה-day to day של מעצבים',                               img: 'https://designai.co.il/wp-content/uploads/2025/12/חן-ויצמן.png' },
  'ד"ר יעקב גרינשפן':    { role: 'UX Strategy',                               talk: 'אהבה, אמון, AI: בניית אפליקציות AI מובטחות',                              img: 'https://designai.co.il/wp-content/uploads/2025/12/יעקב-גרינשפן.png' },
  'רון ברנוב':            { role: 'Creative Workflow Advocate, Weavy',         talk: 'Workflow First: תהליך יצירתי עם AI ו-Weavy',                               img: 'https://designai.co.il/wp-content/uploads/2025/12/רון-ברנוב.png' },
  'שחר קגן':              { role: 'Freelance UX/UI/PM',                        talk: 'שכבת ה-UX החסרה במוצרי AI',                                               img: 'https://designai.co.il/wp-content/uploads/2025/12/שחר-קגן.png' },
  'עידו זייפמן וקרן שגב': { role: 'Co-Founder & Co-CEO, Kido',                talk: 'סוף כל סוף העבודה הידנית ב-Design System',                                 img: 'https://designai.co.il/wp-content/uploads/2025/12/Frame-2147255712.png' },
  'ענבל ברקוביץ':         { role: 'Head of UX, Ocean',                         talk: 'עיצוב בעידן ה-GenUI',                                                      img: 'https://designai.co.il/wp-content/uploads/2026/01/ענבל-ברקוביץ.png' },
  'טל זגורי':             { role: 'מנהל מוצר ו-AI Storyteller',                talk: 'סטוריטלינג בעולם החדש: איך למכור את הרעיונות שלכם ב-2 דקות?',            img: 'https://designai.co.il/wp-content/uploads/2025/12/Frame-2147255703.png' },
  'שירה וינברג הראל':     { role: 'Product and AI Expert, Beyond AI',          talk: 'מנטור לכל עובד.ת: "נבחרת מנטורים" בעזרת AI',                              img: 'https://designai.co.il/wp-content/uploads/2025/12/שירהוינברגהראל.png' },
  'שלי אור גיסר':         { role: 'Gen AI Design Lead, GITAM BBDO',            talk: 'Creative Engineering — הנדסת חשיבה עיצובית',                              img: 'https://designai.co.il/wp-content/uploads/2025/12/שלי-אור-גיסר.png' },
};

let myToken = null;
let myName  = null;

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5 - n); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const code  = document.getElementById('loginCode').value.trim();
  const err   = document.getElementById('loginError');
  err.style.display = 'none';
  if (!email) { err.textContent = 'אנא הכניסו מייל'; err.style.display = 'block'; return; }
  if (!code)  { err.textContent = 'אנא הכניסו סיסמה'; err.style.display = 'block'; return; }

  try {
    const res  = await fetch('/api/speaker/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: code })
    });
    const data = await res.json();
    if (!data.ok) { err.textContent = data.error || 'קוד גישה שגוי'; err.style.display = 'block'; return; }
    myToken = data.token;
    myName  = data.speakerName;
    localStorage.setItem('speaker_token', myToken);
    localStorage.setItem('speaker_name',  myName);
    showPanel();
  } catch(e) {
    err.textContent = 'שגיאת תקשורת, נסו שוב'; err.style.display = 'block';
  }
}

function doLogout() {
  localStorage.removeItem('speaker_token');
  localStorage.removeItem('speaker_name');
  myToken = null; myName = null;
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('loginView').style.display = 'flex';
}

async function showPanel() {
  document.getElementById('loginView').style.display = 'none';
  document.getElementById('mainView').style.display  = 'block';

  const sp = SPEAKERS_DATA[myName] || {};
  document.getElementById('topBarTitle').textContent = myName;
  document.getElementById('spName').textContent = myName;
  document.getElementById('spRole').textContent = sp.role || '';
  document.getElementById('spTalk').textContent = sp.talk || '';
  document.getElementById('spPhoto').src = sp.img || '';
  document.getElementById('spPhoto').alt = myName;

  try {
    const res  = await fetch('/api/rehearsal/my-responses', {
      headers: { 'Authorization': 'Bearer ' + myToken }
    });
    const data = await res.json();
    renderFeedback(data);
  } catch(e) {
    document.getElementById('feedbackList').innerHTML = '<div class="empty-state"><div>שגיאה בטעינת הנתונים</div></div>';
  }
}

function renderFeedback(items) {
  const statsRow = document.getElementById('statsRow');
  const list     = document.getElementById('feedbackList');

  const count = items.length;
  const avgRating = count ? (items.reduce((s, r) => s + (r.rating || 0), 0) / count).toFixed(1) : '—';

  statsRow.innerHTML = `
    <div class="stat-box"><div class="num">${count}</div><div class="lbl">פידבקים התקבלו</div></div>
    <div class="stat-box"><div class="num">${avgRating}</div><div class="lbl">דירוג ממוצע</div></div>
  `;

  if (!count) {
    list.innerHTML = `<div class="empty-state"><div class="icon">💬</div><div>עדיין אין פידבקים עבורך</div></div>`;
    return;
  }

  list.innerHTML = items.map(r => `
    <div class="fb-card">
      <div class="fb-meta">
        <span class="fb-stars">${stars(r.rating || 0)}</span>
        <span class="fb-time">${esc(r.submitted_at || '')}</span>
      </div>
      ${r.liked ? `<div class="fb-row"><div class="fb-label">מה אהבתי</div><div class="fb-text">${esc(r.liked)}</div></div>` : ''}
      ${r.improve ? `<div class="fb-row"><div class="fb-label">מה הייתי משפר</div><div class="fb-text">${esc(r.improve)}</div></div>` : ''}
    </div>
  `).join('');
}

// auto-login if token saved
window.addEventListener('DOMContentLoaded', () => {
  const t = localStorage.getItem('speaker_token');
  const n = localStorage.getItem('speaker_name');
  if (t && n) { myToken = t; myName = n; showPanel(); }
});
</script>
</body>
</html>
