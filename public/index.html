<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Design AI 7.0 — חזרה גנרלית</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Assistant', sans-serif;
    background: #041042;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* animated background blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    animation: float 8s ease-in-out infinite;
    pointer-events: none;
  }
  .blob-1 { width: 500px; height: 500px; background: #981fb6; top: -120px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: #2cffdf; bottom: -100px; right: -80px; animation-delay: 3s; }
  .blob-3 { width: 300px; height: 300px; background: #981fb6; bottom: 100px; left: 20%; animation-delay: 5s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-30px) scale(1.05); }
  }

  /* grid lines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(44,255,223,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,255,223,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 10;
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 48px 40px;
    max-width: 580px;
    width: 92%;
    text-align: center;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; border-radius: 20px; }
    .logo svg { width: 110px; }
    .logo { margin-bottom: 28px; }
    .badge { font-size: 11px; letter-spacing: 1px; margin-bottom: 16px; }
    .subtitle { font-size: 1rem; margin-bottom: 36px; }
    .cta { font-size: 1.05rem; padding: 16px 36px; width: 100%; display: block; }
  }

  .logo { margin-bottom: 40px; }
  .logo svg { width: 140px; height: auto; }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(152,31,182,0.3), rgba(44,255,223,0.15));
    border: 1px solid rgba(44,255,223,0.3);
    color: #2cffdf;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 24px;
  }

  h1 {
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 16px;
    background: linear-gradient(135deg, #fff 30%, #2cffdf);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 1.1rem;
    font-weight: 400;
    color: rgba(255,255,255,0.65);
    margin-bottom: 48px;
    line-height: 1.6;
  }

  .cta {
    display: inline-block;
    background: linear-gradient(135deg, #981fb6, #2cffdf);
    color: #fff;
    font-family: 'Assistant', sans-serif;
    font-size: 1.15rem;
    font-weight: 800;
    padding: 18px 48px;
    border-radius: 100px;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 8px 32px rgba(152,31,182,0.4);
    letter-spacing: 0.5px;
  }
  .cta:hover {
    transform: translateY(-3px) scale(1.03);
    box-shadow: 0 16px 48px rgba(44,255,223,0.35);
  }
  .cta:active { transform: translateY(0) scale(0.98); }

  .arrow {
    display: inline-block;
    margin-right: 8px;
    font-size: 1.2rem;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #981fb6, #2cffdf);
    border-radius: 2px;
    margin: 40px auto 0;
    opacity: 0.5;
  }

  .admin-link {
    display: block;
    margin-top: 20px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.3);
    text-decoration: none;
    transition: color 0.2s;
  }
  .admin-link:hover { color: rgba(255,255,255,0.6); }

  /* entrance animation */
  .card { animation: rise 0.7s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
